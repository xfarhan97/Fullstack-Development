<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 flex items-center justify-center h-screen">

<div class="bg-gray-800 p-10 rounded w-96">

<h2 class="text-white text-2xl mb-6 text-center">
Login
</h2>


<form id="loginForm">

<input id="username" type="text" placeholder="Username"
class="w-full p-3 mb-4 text-black">

<input id="password" type="password" placeholder="Password"
class="w-full p-3 mb-4 text-black">

<button class="bg-blue-500 w-full p-3 text-white">
Login
</button>

</form>

<p id="error" class="text-red-400 mt-3"></p>

<p class="text-gray-300 mt-4 text-center">
Don't have an account?
<a href="register.html" class="text-blue-400">Register here</a>
</p>


<p id="error" class="text-red-400 mt-3"></p>

</div>

<script src="js/login.js"></script>

</body>

</html>
