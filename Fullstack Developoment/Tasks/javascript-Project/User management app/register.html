<!DOCTYPE html>
<html>

<head>

<title>Register</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 flex items-center justify-center h-screen">

<div class="bg-gray-800 p-10 rounded w-96">

<h2 class="text-white text-2xl mb-6 text-center">
Register User
</h2>

<form id="registerForm">

<input id="firstName"
placeholder="First Name"
class="w-full p-3 mb-3 text-black">

<input id="lastName"
placeholder="Last Name"
class="w-full p-3 mb-3 text-black">

<input id="email"
placeholder="Email"
class="w-full p-3 mb-3 text-black">

<input id="phone"
placeholder="Phone"
class="w-full p-3 mb-3 text-black">

<input id="username"
placeholder="Username"
class="w-full p-3 mb-3 text-black">

<input id="password"
type="password"
placeholder="Password"
class="w-full p-3 mb-3 text-black">

<button
class="bg-green-500 w-full p-3">
Register
</button>

<p class="text-gray-300 mt-4 text-center">

Already have an account?

<a href="login.html" class="text-blue-400">

Login here

</a>

</p>

</form>





</div>

<script src="js/register.js"></script>

</body>

</html>
