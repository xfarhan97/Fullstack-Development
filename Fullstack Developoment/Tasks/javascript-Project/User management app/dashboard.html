<!DOCTYPE html>
<html>

<head>

<title>Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 text-white p-10">

<h1 class="text-3xl mb-6 font-bold">

User Management Dashboard

</h1>

<button onclick="logout()" class="bg-red-500 px-4 py-2 mb-6">
Logout
</button>

<!-- SEARCH -->

<input
id="search"
placeholder="Search Users"
class="p-2 text-black mb-6 w-full"
/>

<!-- ADD USER FORM -->

<div class="bg-gray-800 p-6 mb-6 rounded">

<h2 class="text-xl mb-4">Add / Edit User</h2>

<form id="userForm" class="grid grid-cols-2 gap-4">

<input id="firstName"
placeholder="First Name"
class="p-2 text-black">

<input id="lastName"
placeholder="Last Name"
class="p-2 text-black">

<input id="email"
placeholder="Email"
class="p-2 text-black">

<input id="phone"
placeholder="Phone"
class="p-2 text-black">

<button class="bg-blue-500 col-span-2 p-2">

Save User

</button>

</form>

</div>

<!-- USER TABLE -->

<table class="w-full bg-gray-800">

<thead>

<tr class="bg-gray-700">

<th class="p-2">ID</th>
<th class="p-2">First Name</th>
<th class="p-2">Last Name</th>
<th class="p-2">Email</th>
<th class="p-2">Phone</th>
<th class="p-2">Actions</th>

</tr>

</thead>

<tbody id="userTable"></tbody>

</table>

<script src="js/app.js"></script>

</body>

</html>
