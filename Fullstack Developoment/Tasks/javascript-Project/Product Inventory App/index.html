<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Product Inventory</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 p-8">

<h1 class="text-3xl font-bold text-center mb-6">Product Inventory</h1>

<!-- CATEGORY FILTER -->

<div class="flex justify-center mb-6">

<select id="categoryFilter" class="p-2 border rounded">
<option value="all">All Categories</option>
<option value="electronics">electronics</option>
<option value="jewelery">jewelery</option>
<option value="men's clothing">men's clothing</option>
<option value="women's clothing">women's clothing</option>
</select>

</div>

<!-- ADD PRODUCT FORM -->

<div class="max-w-xl mx-auto bg-white p-6 rounded shadow mb-10">

<h2 class="text-xl font-semibold mb-4">Add Product</h2>

<form id="product-form" class="space-y-3">

<input id="title" placeholder="Title" class="w-full border p-2 rounded">

<input id="price" type="number" placeholder="Price" class="w-full border p-2 rounded">

<input id="category" placeholder="Category" class="w-full border p-2 rounded">

<input id="image" placeholder="Image URL" class="w-full border p-2 rounded">

<textarea id="description" placeholder="Description" class="w-full border p-2 rounded"></textarea>

<button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
Add Product
</button>

</form>

<p id="message" class="text-green-600 mt-3"></p>

</div>

<!-- LOADING SPINNER -->

<div id="loading" class="text-center hidden text-xl">
Loading products...
</div>

<!-- EMPTY MESSAGE -->

<div id="emptyState" class="text-center text-gray-500 hidden">
No products found
</div>

<!-- PRODUCT GRID -->

<div id="product-container" class="grid md:grid-cols-3 lg:grid-cols-4 gap-6"></div>

<script src="app.js"></script>

</body>
</html>
